<!DOCTYPE html>
<html dir="rtl">
    <head>
        <meta charset="UTF-8">

    <body>
        
        <header>

            <div id="logo">سَــكينة</div>

         </div>

        </header>
         <!-- navbar END -->


        <main>

          <section>
            <div class="big-parent">
              
              <div class="card">
                  <img src="pic/pic24.jpg" alt="سورة النساء">
                  <div class="container">
                      <span class="card_item">سورة النساء</span>

                  </div>

                  <img src="pic/pic22.jpg" alt="سورة الأنفال">

                      <span class="card_item">رقمها 8</span>
                      <span class="card_item">آياتها 75</span>
                  </div>
              </div>   <!-- CARD2 END -->

              <div class="card">
                  <img src="pic/pic23.jpg" alt="سورة الأنبياء">
                  <div class="container">
                      <span class="card_item">سورة الأنبياء</span>
                      <span class="card_item">رقمها 21</span>
                      <span class="card_item">آياتها 112</span>
                  </div>
              </div>  <!-- CARD3 END -->

            </div> 

          </section>
             

          <!-- /////////////////////////////////////////////////////// CARDS END -->

          <section>

            <div class="hadeeth_parent">
              <div class="quote_box">سبحان الله وبحمده، سبحان الله العظيم</div>
              <div class="quote_box">أستغفر الله العظيم وأتوب إليه</div>
            </div>
          <!-- HADEETH END -->
           
          </section>

        <footer>
